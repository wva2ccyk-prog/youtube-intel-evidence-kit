name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      # The release leak scan rejects generated bytecode artifacts
      # (__pycache__/*.pyc). It must run against the checked-out source tree
      # before any step that compiles or imports the package and writes caches.
      # Editable install above can create an .egg-info / caches, so clean first.
      - name: Clean generated artifacts before release scan
        run: python scripts/clean_generated_artifacts.py
      - name: Public release leak scan (clean source tree)
        run: python scripts/public_release_leak_scan.py
      - name: Encoding check
        run: python scripts/check_encoding.py
      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider
      - name: Compile all sources
        run: python -m compileall -q src tests scripts
      - name: MCP handoff smoke
        run: python -m youtube_mcp_handoff.smoke
