name: Bug report
description: Report incorrect or unexpected behavior in the CLI, contracts, or demo.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include the exact command and use synthetic
        or clearly shareable data only. Do not paste private transcripts or
        copyrighted video content.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you run and what went wrong?
      placeholder: Command, observed output, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps. The bundled `demo` or `topic-demo` is ideal.
      placeholder: |
        1. youtube-intel demo ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or commit hash you are on.
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: OS and Python version
      placeholder: e.g. Windows 11, Python 3.11
    validations:
      required: false
